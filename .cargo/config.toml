[alias]
build-cpu = "build --release --locked --no-default-features"
build-windows = "build --release --locked --target x86_64-pc-windows-msvc --features release-windows"
build-linux = "build --release --locked --target x86_64-unknown-linux-gnu --features release-linux"
build-macos-apple-silicon = "build --release --locked --target aarch64-apple-darwin --features release-macos-apple-silicon"

[env]
CUDA_COMPUTE_CAP = { value = "86", force = false }
